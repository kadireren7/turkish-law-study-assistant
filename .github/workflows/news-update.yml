# Haberler güncelleme: her gün otomatik çalışır, RSS'ten veri çeker, last-update.json yazar.
# Değişiklik varsa commit eder (push için repo write izni gerekir; Vercel deploy ile senkron kalır).
name: Haberler güncelleme

on:
  schedule:
    - cron: '0 6 * * *'   # Her gün 06:00 UTC (Türkiye 09:00)
  workflow_dispatch:      # Manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Haberler güncelle (son 60 gün)
        run: npm run news:update
        continue-on-error: true

      - name: Değişiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add law-data/haberler/
          git diff --staged --quiet || git commit -m "chore(haberler): otomatik güncelleme [skip ci]"
          git push || true
        continue-on-error: true
