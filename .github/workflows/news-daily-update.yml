name: Daily news update

on:
  schedule:
    - cron: '20 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update news data
        run: npm run news:update

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/derived/news/hukuk-haberleri.json data/derived/news/last-update.json
          if git diff --staged --quiet; then
            echo "No news changes detected."
            exit 0
          fi
          git commit -m "chore(news): daily refresh [skip ci]"
          git push
